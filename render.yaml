databases:
  - name: doc-mind-db
    databaseName: doc_mind
    plan: free
    region: frankfurt

services:
  - type: web
    name: doc-mind-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate --schema=services/api/prisma/schema.prisma && npm run build --workspace=services/api
    startCommand: cd services/api && npx prisma migrate deploy && cd ../.. && node services/api/dist/main.js
    buildFilter:
      paths:
        - services/api/**
        - packages/**
        - package.json
        - package-lock.json
        - turbo.json
    envVars:
      - key: NODE_ENV
        value: production

      # Base de données — injectée automatiquement depuis le service Render
      - key: DATABASE_URL
        fromDatabase:
          name: doc-mind-db
          property: connectionString

      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 8h

      # CORS — mettre l'URL Vercel une fois connue (ex: https://doc-mind.vercel.app)
      - key: CORS_ORIGINS
        sync: false

      # Qdrant Cloud
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_COLLECTION
        value: rh_documents
      - key: EMBEDDING_DIMENSIONS
        value: "384"

      # Embeddings
      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: HUGGINGFACE_API_KEY
        sync: false

      # LLM
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # Supabase Storage
      - key: STORAGE_PROVIDER
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: documents

      # OAuth Zoho
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REDIRECT_URI
        sync: false

      # Email
      - key: MAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false

      # Sécurité
      - key: ALTCHA_HMAC_KEY
        generateValue: true
      - key: SIMILARITY_THRESHOLD
        value: "0.5"
